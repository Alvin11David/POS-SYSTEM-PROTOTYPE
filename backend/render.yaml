services:
  backend:
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn pos_system_prototype.wsgi:application --bind 0.0.0.0:8000
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
    autoDeploy: true
    plan: free
    env: python
    staticPublishPath: staticfiles
    preDeployCommand: python manage.py collectstatic --noinput
